services:
  app:
    build:
      context: ../../..
      dockerfile: consejo_ia/deploy/Dockerfile
    container_name: greybark-app
    restart: unless-stopped
    env_file: .env
    volumes:
      - app-data:/data
    networks:
      - internal
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    container_name: greybark-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certs:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - internal

  # Certbot for auto-renewal (run manually first, then cron)
  certbot:
    image: certbot/certbot
    container_name: greybark-certbot
    volumes:
      - certs:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h; done'"

volumes:
  app-data:
  certs:
  certbot-www:

networks:
  internal:
    driver: bridge
