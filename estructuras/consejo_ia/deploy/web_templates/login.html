<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Research Portal</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body">
    <div class="login-card">
        <h1 class="login-title">Research Portal</h1>
        <p class="login-subtitle">Acceso de clientes</p>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login" class="login-form">
            <div class="form-group">
                <label for="client_id">ID de cliente</label>
                <input type="text" id="client_id" name="client_id" required
                       autocomplete="username" placeholder="ej: greybark">
            </div>
            <div class="form-group">
                <label for="password">Contrasena</label>
                <input type="password" id="password" name="password" required
                       autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Ingresar</button>
        </form>
    </div>
</body>
</html>
