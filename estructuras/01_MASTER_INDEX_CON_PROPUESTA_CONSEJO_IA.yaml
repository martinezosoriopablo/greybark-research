# =============================================================================
# PARTE 5: CÓDIGO PYTHON AI COUNCIL
# =============================================================================

implementacion_python:
  
  ai_council_runner: |
    import asyncio
    from anthropic import Anthropic
    
    async def run_ai_council(inputs: dict) -> dict:
        """
        Ejecuta el AI Council completo.
        
        Args:
            inputs: Dict con todos los datos (reportes, news, polymarket, regime)
        
        Returns:
            Dict con output final estructurado
        """
        
        # =====================================================================
        # CAPA 1: PANEL HORIZONTAL (en paralelo)
        # =====================================================================
        
        macro_prompt = prepare_macro_prompt(inputs)
        rv_prompt = prepare_rv_prompt(inputs)
        rf_prompt = prepare_rf_prompt(inputs)
        riesgo_prompt = prepare_riesgo_prompt(inputs)
        geo_prompt = prepare_geo_prompt(inputs)
        
        # Ejecutar en paralelo
        macro_output, rv_output, rf_output, riesgo_output, geo_output = await asyncio.gather(
            call_claude(IAS_MACRO_SYSTEM, macro_prompt),
            call_claude(IAS_RV_SYSTEM, rv_prompt),
            call_claude(IAS_RF_SYSTEM, rf_prompt),
            call_claude(IAS_RIESGO_SYSTEM, riesgo_prompt),
            call_claude(IAS_GEO_SYSTEM, geo_prompt)
        )
        
        panel_outputs = {
            "macro": macro_output,
            "rv": rv_output,
            "rf": rf_output,
            "riesgo": riesgo_output,
            "geo": geo_output
        }
        
        # =====================================================================
        # CAPA 2: SÍNTESIS VERTICAL (secuencial)
        # =====================================================================
        
        # Paso 1: CIO sintetiza
        cio_prompt = prepare_cio_prompt(panel_outputs)
        cio_output = await call_claude(IAS_CIO_SYSTEM, cio_prompt)
        
        # Paso 2: Contrarian critica
        contrarian_prompt = prepare_contrarian_prompt(cio_output, panel_outputs)
        contrarian_output = await call_claude(IAS_CONTRARIAN_SYSTEM, contrarian_prompt)
        
        # Paso 3: Refinador produce output final
        final_prompt = prepare_final_prompt(cio_output, contrarian_output)
        final_output = await call_claude(REFINADOR_SYSTEM, final_prompt)
        
        # =====================================================================
        # OUTPUT
        # =====================================================================
        
        return {
            "panel_outputs": panel_outputs,
            "cio_synthesis": cio_output,
            "contrarian_critique": contrarian_output,
            "final_recommendation": final_output,
            "metadata": {
                "timestamp": datetime.now().isoformat(),
                "model": "claude-sonnet-4",
            }
        }
    
    
    async def call_claude(system_prompt: str, user_prompt: str) -> str:
        """Llama a Claude API con retry logic."""
        client = Anthropic()
        response = await client.messages.create(
            model="claude-sonnet-4-20250514",
            max_tokens=2000,
            system=system_prompt,
            messages=[{"role": "user", "content": user_prompt}]
        )
        return response.content[0].text

