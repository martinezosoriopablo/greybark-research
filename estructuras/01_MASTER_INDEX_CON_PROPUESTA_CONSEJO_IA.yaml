# =============================================================================
# PARTE 3: POLYMARKET INTEGRATION
# =============================================================================

polymarket:
  
  descripcion: |
    Mercado de predicción donde la gente apuesta dinero real sobre outcomes.
    El precio = probabilidad implícita.
  
  valor:
    1: "SEÑAL DE IMPORTANCIA: Si hay $50M apostados, el evento IMPORTA"
    2: "PROBABILIDADES DE MERCADO: Más confiable que encuestas"
    3: "CAMBIOS EN ODDS: Movimientos señalan nueva información"
  
  categorias_relevantes:
    elections:
      ejemplos: ["US President 2028", "key elections"]
      relevancia: "Policy risk"
    
    fed_rates:
      ejemplos: ["Will Fed cut in March?"]
      relevancia: "Renta fija directamente"
    
    geopolitics:
      ejemplos: ["China invade Taiwan by 2027?"]
      relevancia: "Tail risk"
    
    crypto:
      ejemplos: ["Bitcoin ATH", "ETF approvals"]
      relevancia: "Alt assets"
    
    companies:
      ejemplos: ["Tesla bankruptcy?", "NVDA earnings beat?"]
      relevancia: "Equity"
  
  api:
    url: "https://gamma-api.polymarket.com/markets"
    docs: "https://docs.polymarket.com/"
    
    codigo_python: |
      import requests
      
      def get_polymarket_markets(category: str = None):
          """
          Obtiene mercados activos de Polymarket.
          """
          url = "https://gamma-api.polymarket.com/markets"
          params = {
              "active": True,
              "closed": False,
              "order": "volume24hr",
              "ascending": False,
              "limit": 50
          }
          
          response = requests.get(url, params=params)
          markets = response.json()
          
          return [
              {
                  "question": m["question"],
                  "probability": m.get("outcomePrices", [None])[0],
                  "volume_24h": m.get("volume24hr", 0),
                  "total_volume": m.get("volume", 0),
                  "end_date": m.get("endDate"),
                  "category": m.get("category")
              }
              for m in markets
          ]
      
      def get_relevant_for_finance():
          """
          Filtra mercados relevantes para análisis financiero.
          """
          all_markets = get_polymarket_markets()
          
          finance_keywords = [
              "fed", "rate", "inflation", "recession", "gdp",
              "bitcoin", "crypto", "etf",
              "china", "taiwan", "russia", "iran", "war",
              "election", "president", "congress",
              "oil", "opec", "commodity"
          ]
          
          relevant = []
          for market in all_markets:
              question_lower = market["question"].lower()
              if any(kw in question_lower for kw in finance_keywords):
                  relevant.append(market)
          
          return relevant
  
  output_json_ejemplo:
    polymarket_snapshot:
      timestamp: "2026-01-22T10:00:00Z"
      markets:
        - question: "Will the Fed cut rates in March 2026?"
          probability: 0.35
          change_24h: -0.05
          volume_24h: 1250000
          total_volume: 15000000
          relevance: "Renta Fija directamente"
        
        - question: "Will China invade Taiwan before 2028?"
          probability: 0.12
          change_24h: 0.01
          volume_24h: 500000
          total_volume: 45000000
          relevance: "Tail risk geopolítico"
        
        - question: "US recession in 2026?"
          probability: 0.28
          change_24h: 0.02
          volume_24h: 800000
          total_volume: 22000000
          relevance: "Macro outlook"

# =============================================================================
# PARTE 4: PIPELINE DE PROCESAMIENTO DE NOTICIAS
# =============================================================================

pipeline_noticias:
  
  diagrama: |
    ┌─────────────────────────────────────────────────────────────────────┐
    │                    1. RECOLECCIÓN (cada 4 horas)                    │
    │  RSS Feeds + Email + Scraping + APIs → Raw News Pool (SQLite/JSON) │
    └───────────────────────────────┬─────────────────────────────────────┘
                                    ▼
    ┌─────────────────────────────────────────────────────────────────────┐
    │                    2. CURACIÓN (Claude Haiku)                       │
    │  Por cada noticia: Relevancia + Categoría + Entidades + Sentiment  │
    │  Output: curated_news_{date}.json                                   │
    └───────────────────────────────┬─────────────────────────────────────┘
                                    ▼
    ┌─────────────────────────────────────────────────────────────────────┐
    │              3. CONTRASTE MULTI-FUENTE (Claude Sonnet)              │
    │  Para hot topics: ¿Qué dice cada fuente? ¿Dónde divergen?          │
    │  Output: contrasted_narratives_{date}.json                          │
    └───────────────────────────────┬─────────────────────────────────────┘
                                    ▼
    ┌─────────────────────────────────────────────────────────────────────┐
    │                    4. INPUT PARA AI COUNCIL                         │
    │  council_news_input.json: occidental + global + polymarket + hot   │
    └─────────────────────────────────────────────────────────────────────┘
  
  # ---------------------------------------------------------------------------
  # PASO 2: PROMPT CURADOR DE NOTICIAS
  # ---------------------------------------------------------------------------
  curador_noticias:
    modelo: "Claude Haiku"
    frecuencia: "Cada 4 horas"
    
    system_prompt: |
      Eres un CURADOR DE NOTICIAS financieras para Grey Bark Advisors.
      
      ## TU TAREA
      Procesar noticias de MÚLTIPLES FUENTES y prepararlas para el AI Council.
      
      ## PARA CADA NOTICIA, EVALÚA:
      
      1. **RELEVANCIA FINANCIERA** (High/Medium/Low/Noise)
         - High: Mueve mercados HOY
         - Medium: Contexto importante
         - Low: Background
         - Noise: Ignorar
      
      2. **CATEGORÍA PRINCIPAL**
         - Macro/Fed, Macro/BCE, Macro/BCCh, Macro/China
         - RV/US, RV/EM, RV/Chile
         - RF/Rates, RF/Credit
         - Geo/US-China, Geo/Russia-Europe, Geo/Middle-East
         - Commodities/Oil, Commodities/Metals
         - Tech/AI
         - Chile
      
      3. **EXTRAE**:
         - Entidades mencionadas (países, empresas, personas)
         - Cifras clave (si hay)
         - Sentiment implícito (positivo/negativo/neutral)
         - Source bias (conocido sesgo de la fuente)
      
      4. **DETECTA HOT TOPICS**
         - Si un tema aparece en 3+ fuentes distintas, es HOT
         - Marcar para análisis de contraste multi-fuente
      
      ## OUTPUT FORMAT (JSON)
      {
        "headline": "...",
        "source": "WSJ|TASS|Xinhua|etc",
        "source_bias": "Pro-US|Pro-Russia|Pro-China|Neutral|etc",
        "relevance": "High|Medium|Low",
        "category": "Macro/Fed",
        "entities": ["Fed", "Powell", "inflation"],
        "key_figures": {"rate_cut_prob": "65%"},
        "sentiment": "hawkish",
        "hot_topic_match": "Fed policy"
      }
  
  # ---------------------------------------------------------------------------
  # PASO 3: PROMPT CONTRASTE MULTI-FUENTE
  # ---------------------------------------------------------------------------
  contraste_multifuente:
    modelo: "Claude Sonnet"
    trigger: "Hot topic (3+ fuentes)"
    
    user_prompt_template: |
      Analiza cómo distintas fuentes reportan el siguiente evento/tema:
      
      ## TEMA: {hot_topic}
      
      ## COBERTURA POR FUENTE:
      
      ### Fuentes Occidentales
      **WSJ**: {wsj_excerpt}
      **Financial Times**: {ft_excerpt}
      **Reuters**: {reuters_excerpt}
      
      ### Fuentes Rusas
      **TASS**: {tass_excerpt}
      
      ### Fuentes Chinas
      **Xinhua**: {xinhua_excerpt}
      **SCMP**: {scmp_excerpt}
      
      ### Otras
      **Al Jazeera**: {aljazeera_excerpt}
      
      ---
      
      ## TU ANÁLISIS DEBE INCLUIR:
      
      ### 1. EL HECHO OBJETIVO
      ¿Qué REALMENTE pasó, despojado de narrativa?
      
      ### 2. DIVERGENCIAS EN NARRATIVA
      | Fuente | Narrativa Principal | Sesgo Evidente |
      |--------|---------------------|----------------|
      | WSJ    | ...                 | ...            |
      | TASS   | ...                 | ...            |
      | Xinhua | ...                 | ...            |
      
      ### 3. LO QUE NO SE DICE
      ¿Qué está OMITIENDO cada fuente?
      
      ### 4. SEÑALES ADELANTADAS
      ¿La narrativa de algún bloque sugiere ACCIONES FUTURAS?
      
      ### 5. IMPLICACIÓN PARA MERCADOS
      - Impacto inmediato (hoy/mañana)
