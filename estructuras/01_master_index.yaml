# =============================================================================
# WORKFLOW DE GENERACIÓN
# =============================================================================

workflow:
  
  paso_0:
    nombre: "Reporte Diario"
    accion: "Ejecutar daily_market_snapshot.py + generate_daily_report.py"
    output: "4 reportes diarios"
    frecuencia: "2x día"
  
  paso_1:
    nombre: "Regime Classification"
    accion: "Ejecutar regime_classification.py"
    output: "regime_classification.json"
    frecuencia: "Mensual, antes de generar reportes"
  
  paso_2:
    nombre: "Fetch Data"
    accion: "Ejecutar scripts de data fetching usando DATA_DICTIONARY"
    output: "DataFrames con series necesarias"
  
  paso_3:
    nombre: "Generate Charts"
    accion: "Crear gráficos usando datos fetched"
    output: "PNG/SVG files"
    incluye: "Charts #2-#55 según reporte"
  
  paso_4:
    nombre: "AI Council Debate"
    accion: "IAS procesan datos y debaten"
    output: "Recomendaciones consensuadas + disensos"
  
  paso_5:
    nombre: "Generate Content"
    accion: "AI escribe secciones usando templates + datos + regime + debate"
    output: "Markdown sections"
  
  paso_6:
    nombre: "Assemble Report"
    accion: "Combinar secciones + charts en documento final"
    output: "PDF + HTML"
  
  paso_7:
    nombre: "Quality Check"
    accion: "Verificar completitud, data freshness, charts presentes"
  
  paso_8:
    nombre: "Distribute"
    accion: "Email a clientes + upload a web"

# =============================================================================
