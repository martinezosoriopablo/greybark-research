#
# Leyenda: ✅ = Implementado con datos reales | ⚠️ = Hardcoded/stub | ❌ = No implementado
#
# --- REPORTE MACRO (chart_generator.py + chart_data_provider.py) ---
# 28 charts implementados, la mayoría con datos reales BCCh/FRED:
#
#   ✅ inflation_evolution        (FRED: CPI, Core CPI, PCE Core)
#   ✅ inflation_heatmap          (BCCh: IPC 10 países + Core 7 países)
#   ✅ labor_unemployment         (FRED: UNRATE, U6RATE)
#   ✅ labor_nfp                  (FRED: PAYEMS)
#   ✅ labor_jolts                (FRED: JTSJOL, JTSQUR)
#   ✅ labor_wages                (FRED: CES0500000003, ECIWAG, CIVPART)
#   ✅ usa_leading_indicators     (FRED: NEWORDER, HOUST, CSCICP03, UMCSENT)
#   ✅ yield_curve                (FRED: DGS1MO..DGS30)
#   ✅ yield_spreads              (FRED: DGS2, DGS10, DGS3MO)
#   ✅ fed_vs_ecb_bcch            (BCCh: tasas de política 10 bancos centrales)
#   ✅ commodity_prices           (BCCh: tabla HTML, valor + 1m/3m/1y changes)
#   ✅ energy_food                (BCCh: Brent, WTI, gas, alimentos)
#   ✅ chile_dashboard            (BCCh: IMACEC, IPC, desempleo, USD/CLP)
#   ✅ chile_external             (BCCh: exportaciones, importaciones, balanza, cobre)
#   ✅ latam_rates                (BCCh: tasas LatAm)
#   ✅ china_dashboard            (BCCh: GDP, CPI, PPI, desempleo China)
#   ⚠️ europe_pmi                (PMI propietario S&P Global — hardcoded)
#   ⚠️ china_trade               (sin datos comercio total China en BCCh)
#   ⚠️ pmi_global                (PMI propietario — hardcoded)
#   ✅ chile_inflation_components (BCCh: IPC componentes)
#   ✅ europe_dashboard           (BCCh: GDP, CPI, desempleo Eurozona)
#   ✅ global_equities            (BCCh: índices bursátiles)
#   ⚠️ inflation_components_ts   (CPI subcomponents Shelter/Services — sin FRED simple)
#
# --- REPORTE RV (rv_content_generator.py + equity_data_collector.py) ---
# Tablas generadas en código, no charts PNG:
#
#   ✅ Tabla resumen regional      (yfinance: SPY/EFA/EEM/EWJ/ECH + BCCh IPSA)
#   ✅ Matriz sectorial            (yfinance: 11 sector ETFs + BCCh commodities)
#   ✅ Earnings growth             (AV: EARNINGS beat rate/surprise + EARNINGS_ESTIMATES growth/revisions)
#   ✅ Revision trends             (AV: EARNINGS_ESTIMATES revision_up/down_trailing_30_days)
#   ✅ Márgenes y ROE              (AV: OVERVIEW ProfitMargin/OperatingMarginTTM/ReturnOnEquityTTM)
#   ✅ Earnings calendar           (AV: EARNINGS_CALENDAR CSV — 9,872 entries filtradas)
#   ✅ Correlaciones               (yfinance: 10 activos, 6M rolling)
#   ✅ VaR/CVaR/Drawdown           (greybark.risk.metrics)
#   ✅ Style Growth/Value/Size     (yfinance: IWF/IWD/IWB/IWM)
#   ✅ Credit spreads              (FRED: IG/HY OAS)
#   ✅ Tasas reales / ERP          (FRED: TIPS + yfinance SPY PE)
#   ✅ BCCh indices                (BCCh: IPSA/IGPA/intl/USD-CLP/commodities)
#   ⚠️ Factor analysis            (AV: solo momentum funciona para ETFs)
#   ⚠️ Breadth                    (yfinance: bug timezone, returns error)
#
# --- REPORTE RF (rf_content_generator.py + rf_data_collector.py) ---
# 12 módulos de datos, tablas en código:
#
#   ✅ UST yields + slopes         (FRED: DGS2/5/10/30)
#   ✅ Chile BCP full curve         (BCCh: F022.BCLP.TIS.AN*)
#   ✅ Chile BCU full curve         (BCCh: F022.BUF.TIS.AN* — sin 2Y)
#   ✅ Chile swap curve SPC         (BCCh: SPC CLP 2Y/5Y/10Y + UF 5Y/10Y)
#   ✅ International yields 8 países (BCCh: F019.TBG.TAS.*.D)
#   ✅ IG/HY spreads breakdown      (FRED: BAML indices)
#   ✅ Breakeven + TIPS              (FRED: T5YIE/T10YIE/DFII5/DFII10)
#   ✅ TPM + DAP + interbancaria     (BCCh: TPM, DAP 90d/1y, préstamos)
#   ✅ Policy rates 7 bancos centrales (BCCh: Fed/ECB/BOJ/BOE/PBOC/BCB/Banxico)
#   ✅ VIX + MOVE                    (yfinance/BCCh)
#   ⚠️ CDS soberanos               (propietario — hardcoded)
#   ⚠️ Carry/rolldown calc          (requiere cálculo manual — hardcoded)
#
# --- REPORTE AA (asset_allocation_content_generator.py) ---
# 9 secciones, tablas HTML:
#
#   ✅ Dashboard OW/N/UW            (council output + market_data)
#   ✅ Portafolios modelo 5×9       (council output)
#   ✅ Focus list ETFs              (council output)
#   ✅ Escenarios base/bull/bear    (council output)
#   ⚠️ Track record / hit rate     (no implementado — sin DB histórica)
#   ⚠️ Efficient frontier          (no implementado)
#
# --- CHARTS v4.0 NO IMPLEMENTADOS (del catálogo original) ---
#   ❌ #24 VaR Histórico chart      (datos existen en risk.metrics, falta chart PNG)
#   ❌ #25 Stress Test chart         (datos existen, falta chart)
#   ❌ #26 LSTM Predictions          (no implementado)
#   ❌ #29 China Credit Impulse      (sin datos BCCh de credit impulse)
#   ❌ #30 China-Commodities Link    (sin datos)
#   ❌ #31-32 Advance-Decline/Highs  (sin datos NYSE)
#   ❌ #33-34 Sector Breadth charts  (datos parciales, sin chart)
#   ❌ #35 TPM Real Chile chart      (datos existen, sin chart dedicado)
#   ❌ #36-38 Swap/Breakeven/Carry   (datos en rf_data_collector, sin chart)
#   ❌ #40-41 Beat Rate/Insider chart (datos existen, sin chart PNG)
#   ❌ #42-43 Factor charts          (datos parciales, sin chart)
#   ❌ #44-45 Duration/Curve chart   (datos existen, sin chart)
#   ❌ #46-48 Credit Spread charts   (datos existen, sin chart)
#   ❌ #50-53 AA Framework charts    (no implementado)
#   ❌ #54-55 Track Record charts    (no implementado)
#
# =============================================================================

