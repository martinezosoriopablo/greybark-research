# =============================================================================
# 🆕 v4.0: ARQUITECTURA AI COUNCIL
# =============================================================================
# 
# El diferenciador clave de Greybark Research: no vendemos reportes, vendemos un
# DEPARTAMENTO DE RESEARCH COMPLETO con especialistas que debaten.
#
#   MÚLTIPLES FUENTES GLOBALES
#           ↓
#      5 IAS SPECIALISTS
#           ↓
#      AI COUNCIL (debate)
#           ↓
#    CONSENSO + DISENSOS
#           ↓
#       REPORTES
#
# =============================================================================

ai_council:
  
  descripcion: |
    El AI Council replica la dinámica de un comité de inversiones profesional.
    5 Intelligent Analyst Specialists (IAS) procesan información y DEBATEN
    para producir recomendaciones más robustas que un solo analista.
  
  valor_propuesta: |
    "Acceso a un departamento de research completo con especialistas que
    procesan información global y debaten para darte mejores decisiones."
  
  especialistas:
    
    ias_macro:
      nombre: "IAS Macro"
      expertise:
        - "Regímenes económicos (recession/slowdown/moderate/expansion/late_cycle)"
        - "Bancos centrales (Fed, BCE, BCCh)"
        - "Leading indicators"
        - "China credit impulse"
        - "Geopolítica market-relevant"
      output: "Contexto macro, clasificación de régimen, catalizadores"
      alimenta_reportes: ["Macro", "Asset Allocation"]
    
    ias_renta_variable:
      nombre: "IAS Renta Variable"
      expertise:
        - "Earnings analysis (beat rate, revisions)"
        - "Valuaciones (P/E, EV/EBITDA)"
        - "Análisis sectorial"
        - "Factor analysis (value, growth, momentum, quality)"
        - "Market breadth"
      output: "Recomendaciones equity, sectores, factores"
      alimenta_reportes: ["Renta Variable", "Asset Allocation"]
    
    ias_renta_fija:
      nombre: "IAS Renta Fija"
      expertise:
        - "Duration positioning"
        - "Credit spreads (IG, HY por rating)"
        - "Curvas de tasas (US, Chile)"
        - "Chile profundo (Swap CÁMARA, breakeven)"
        - "Carry trade analysis"
      output: "Duration, credit allocation, oportunidades Chile"
      alimenta_reportes: ["Renta Fija", "Asset Allocation"]
    
    ias_riesgo:
      nombre: "IAS Riesgo"
      expertise:
        - "VaR (95%, 99%)"
        - "Expected Shortfall"
        - "Stress testing (6 escenarios)"
        - "Correlaciones dinámicas"
        - "Tail risks"
        - "LSTM price predictions"
      output: "Métricas de riesgo, alertas, hedging"
      alimenta_reportes: ["Macro", "Asset Allocation"]
    
    ias_asset_allocation:
      nombre: "IAS Asset Allocation"
      expertise:
        - "Construcción de portafolio"
        - "5 perfiles de riesgo"
        - "13 asset classes"
        - "Tactical vs strategic"
        - "Track record"
      output: "Portafolios modelo, cambios tácticos, accountability"
      alimenta_reportes: ["Asset Allocation"]
  
  dinamica_debate:
    descripcion: |
      Los IAS no operan en silos. DEBATEN entre sí para contrastar perspectivas
      y producir recomendaciones más robustas.
    
    ejemplo:
      situacion: "Fed más hawkish de lo esperado"
      debate:
        ias_macro: "Régimen → SLOWDOWN, probabilidad recesión sube"
        ias_renta_fija: "Extender duración, pero cuidado con crédito HY"
        ias_renta_variable: "Rotar a Quality y Defensivos, reducir Cyclicals"
        ias_riesgo: "VaR sube 15%, activar hedge con puts"
        ias_asset_allocation: "Consenso: reducir equity 5%. Disenso: timing del hedge"
      output: "Recomendación integra todas las perspectivas + documenta disenso"
    
    valor:
      - "Evita sesgo de un solo analista"
      - "Identifica blind spots"
      - "Documenta disensos (no solo consenso)"
      - "Recomendaciones más robustas"

