<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f4f4f4;
      margin: 0;
      font-family: 'Montserrat', 'Helvetica Neue', Arial, sans-serif;
    }
    .logo-container {
      background: white;
      padding: 60px;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

<div class="logo-container">
  <svg width="400" height="100" viewBox="0 0 400 100" xmlns="http://www.w3.org/2000/svg">
    
    <defs>
      <style>
        .tree-color { fill: #948B75; } /* Bronce Añejado */
        .text-color { fill: #2F3640; } /* Gris Carbón */
      </style>
    </defs>

    <g transform="translate(20, 15)">
      <path class="tree-color" d="M10,40 Q35,5 60,40 L52,40 Q35,18 18,40 Z" />
      <path class="tree-color" d="M5,50 Q35,10 65,50 L57,50 Q35,23 13,50 Z" />
      <path class="tree-color" d="M0,60 Q35,15 70,60 L62,60 Q35,28 8,60 Z" />
      
      <path class="tree-color" d="M28,62 L42,62 L44,75 L26,75 Z" />
    </g>

    <text x="100" y="68" font-family="'Arial Black', 'Helvetica Bold', sans-serif" font-weight="900" font-size="38" letter-spacing="1.5" class="text-color">
      GREYBARK
    </text>
    
  </svg>
  </div>

</body>
</html>
