{% extends "base.html" %}
{% block title %}{{ report.name }}{% endblock %}
{% block nav_reports %}active{% endblock %}

{% block head %}
<style>
    .report-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
    }
    .report-toolbar .btn { margin-left: 0.5rem; }
    .report-frame {
        width: 100%;
        min-height: 80vh;
        border: 1px solid #ddd;
        border-radius: 6px;
        background: #fff;
    }
</style>
{% endblock %}

{% block content %}
<div class="report-toolbar">
    <div>
        <a href="/reports" class="btn btn-outline">&larr; Reportes</a>
    </div>
    <div>
        <a href="/reports/raw/{{ report.rel_path }}" target="_blank" class="btn btn-outline">Abrir en nueva ventana</a>
        <a href="/download/{{ report.rel_path }}" class="btn btn-primary">Descargar</a>
    </div>
</div>
<iframe src="{{ embed_url }}" class="report-frame" frameborder="0"></iframe>
{% endblock %}
